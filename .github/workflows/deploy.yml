name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: 158.23.17.242
          username: azureuser
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            set -e
            echo "=== PASO 1: Git pull ==="
            cd /home/azureuser/securesab_project
            git status
            git fetch origin main
            git reset --hard origin/main
            
            echo "=== PASO 2: Activar entorno virtual ==="
            source venv/bin/activate
            
            echo "=== PASO 3: Instalar dependencias ==="
            pip install -r requirements.txt
            
            echo "=== PASO 4: Migraciones ==="
            python manage.py migrate || true
            
            echo "=== PASO 5: Collectstatic ==="
            python manage.py collectstatic --noinput || true
            
            echo "=== PASO 6: Reiniciar servicio ==="
            sudo systemctl restart gunicorn || sudo systemctl restart securesab || sudo systemctl restart securesab.service || true
            
            echo "=== DEPLOY COMPLETADO ==="
            systemctl status gunicorn --no-pager || true
