name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 158.23.17.242
          username: azureuser
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            set -e
            cd /home/azureuser/securesab_project
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --check 2>/dev/null || true
            sudo systemctl restart gunicorn || sudo systemctl restart securesab || true
